name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package project
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='.env' \
            -czf /tmp/app.tar.gz .

      - name: Setup SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Create env files
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EC2_2: ${{ secrets.EC2_2 }}
          EC2_3: ${{ secrets.EC2_3 }}
        run: |
          cat > /tmp/common.env <<EOF
          JWT_SECRET=${JWT_SECRET}
          DATABASE_URL=${DATABASE_URL}
          GATEWAY_PORT=3000
          AUTH_PORT=3001
          OWNER_PORT=3002
          CUSTOMER_PORT=3003
          PAYMENT_PORT=3004
          REVIEW_PORT=3005
          EOF
          sed -i 's/^          //' /tmp/common.env

          cp /tmp/common.env /tmp/gateway.env
          cat >> /tmp/gateway.env <<EOF
          AUTH_SERVICE_URL=http://auth-service:3001
          OWNER_SERVICE_URL=http://${EC2_2}:3002
          CUSTOMER_SERVICE_URL=http://${EC2_2}:3003
          PAYMENT_SERVICE_URL=http://${EC2_3}:3004
          REVIEW_SERVICE_URL=http://${EC2_3}:3005
          EOF

      - name: Deploy services
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_1: ${{ secrets.EC2_1 }}
          EC2_2: ${{ secrets.EC2_2 }}
          EC2_3: ${{ secrets.EC2_3 }}
        run: |
          set -e

          deploy() {
            HOST="$1"
            ENV_FILE="$2"
            SERVICES="$3"
            APP_DIR="/home/${EC2_USER}/midterm-app"

            echo "Deploying ${SERVICES} to ${HOST}"

            ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${HOST}" "mkdir -p ${APP_DIR}"
            scp -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no /tmp/app.tar.gz "${EC2_USER}@${HOST}:${APP_DIR}/app.tar.gz"
            scp -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no "${ENV_FILE}" "${EC2_USER}@${HOST}:${APP_DIR}/.env"

            ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no "${EC2_USER}@${HOST}" \
              "cd ${APP_DIR} && tar -xzf app.tar.gz && \
              if docker compose version >/dev/null 2>&1; then \
                docker compose up -d --build ${SERVICES} && docker compose ps; \
              elif command -v docker-compose >/dev/null 2>&1; then \
                docker-compose up -d --build ${SERVICES} && docker-compose ps; \
              else \
                echo 'Docker Compose is not installed on the deployment server.' >&2; \
                exit 127; \
              fi"
          }

          deploy "$EC2_1" /tmp/gateway.env "api-gateway auth-service"
          deploy "$EC2_2" /tmp/common.env "owner-service customer-service"
          deploy "$EC2_3" /tmp/common.env "payment-service review-service"
